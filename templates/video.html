{% extends "layout.html" %}

{% block content %}
<div class="row">

<div class="col-md-8">
    <h3>AI Video Tutor</h3>
    <input id="topic" class="form-control" placeholder="Enter topic">
    <select id="level" class="form-control mt-2">
        <option>Beginner</option>
        <option>Intermediate</option>
        <option>Advanced</option>
    </select>
    <button onclick="generateVideo()" class="btn btn-primary mt-2">Generate Video</button>
    <hr>
    <video id="lessonVideo" width="100%" height="450" controls style="background:#000;"></video>
</div>

<div class="col-md-4">
    <h4>Ask Doubt</h4>
    <input id="question" class="form-control" placeholder="Ask your doubt">
    <button onclick="askDoubt()" class="btn btn-primary mt-2">Ask AI</button>
    <hr>
    <div id="chatbox" style="height:400px;overflow:auto;"></div>
</div>

</div>

<script>
async function generateVideo() {
    const topic = document.getElementById("topic").value;
    const level = document.getElementById("level").value;

    if (!topic) return alert("Enter topic");

    const res = await fetch("/generate-ai-video", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            topic: topic,
            level: {"Beginner":"easy","Intermediate":"medium","Advanced":"hard"}[level]
        })
    });

    const data = await res.json();

    if (data.video_path) {
        const video = document.getElementById("lessonVideo");
        video.src = '/' + data.video_path.replace(/\\/g, '/') + '?t=' + Date.now();
        video.load();
    }
}

async function askDoubt() {
    const question = document.getElementById("question").value;
    if (!question) return;

    const res = await fetch("/ai-chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({question: question})
    });

    const data = await res.json();
    document.getElementById("chatbox").innerHTML +=
        `<div class="card p-2 mb-2"><b>You:</b> ${question}<br><b>AI:</b> ${data.answer}</div>`;
    document.getElementById("question").value = "";
}
</script>
{% endblock %}
